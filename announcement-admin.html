<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement Management - Tech Cross</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .announcement-admin-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 40px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .announcement-admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .announcement-admin-header h1 {
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .announcement-admin-header p {
            color: #6e6e73;
            font-size: 17px;
        }

        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 17px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #D4E157;
            box-shadow: 0 0 0 4px rgba(212, 225, 87, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .toggle-switch label {
            font-size: 17px;
            font-weight: 500;
            color: #1d1d1f;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 51px;
            height: 31px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #d2d2d7;
            transition: 0.4s;
            border-radius: 31px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 27px;
            width: 27px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #D4E157;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #D4E157;
            color: #000;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #c5d148;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 225, 87, 0.3);
        }

        .btn-logout {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #6e6e73;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .btn-logout:hover {
            background: #f5f5f7;
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 15px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .preview-section {
            margin-top: 32px;
            padding: 24px;
            background: #f5f5f7;
            border-radius: 12px;
        }

        .preview-section h3 {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 16px;
        }

        .preview-announcement {
            background: #000;
            color: #D4E157;
            padding: 12px 0;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            overflow: hidden;
        }

        .preview-announcement-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-left 20s linear infinite;
        }

        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #0071e3;
            text-decoration: none;
            font-size: 15px;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="announcement-admin-container">
        <a href="index.html" class="back-link">← Back to Home</a>
        
        <div class="announcement-admin-header">
            <h1>🔔 Announcement Management</h1>
            <p>Manage scrolling announcement banner</p>
        </div>

        <div id="message"></div>

        <!-- Login Form -->
        <div id="loginSection" class="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn-submit" onclick="login()">Login</button>
        </div>

        <!-- Management Form -->
        <div id="managementSection" style="display: none;">
            <div class="toggle-switch">
                <label>Enable Announcement</label>
                <label class="switch">
                    <input type="checkbox" id="announcementEnabled">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="form-group">
                <label>Announcement Text (English)</label>
                <textarea id="announcementTextEn" placeholder="Enter announcement text in English..."></textarea>
            </div>

            <div class="form-group">
                <label>Announcement Text (Irish)</label>
                <textarea id="announcementTextGa" placeholder="Enter announcement text in Irish..."></textarea>
            </div>

            <div class="form-group">
                <label>Font Size (px)</label>
                <input type="number" id="fontSize" min="12" max="32" value="15" step="1">
                <small style="color: #6e6e73; font-size: 13px;">Recommended: 14-18px</small>
            </div>

            <div class="form-group">
                <label>Font Weight</label>
                <select id="fontWeight" style="width: 100%; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 17px;">
                    <option value="400">Normal</option>
                    <option value="500" selected>Medium</option>
                    <option value="600">Semi-Bold</option>
                    <option value="700">Bold</option>
                </select>
            </div>

            <div class="form-group">
                <label>Text Color</label>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <input type="color" id="textColor" value="#D4E157" style="width: 60px; height: 40px; border: 1px solid #d2d2d7; border-radius: 8px; cursor: pointer;">
                    <input type="text" id="textColorHex" value="#D4E157" placeholder="#D4E157" style="flex: 1; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 15px; font-family: monospace;">
                </div>
            </div>

            <div class="form-group">
                <label>Background Color</label>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <input type="color" id="bgColor" value="#000000" style="width: 60px; height: 40px; border: 1px solid #d2d2d7; border-radius: 8px; cursor: pointer;">
                    <input type="text" id="bgColorHex" value="#000000" placeholder="#000000" style="flex: 1; padding: 12px 16px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 15px; font-family: monospace;">
                </div>
            </div>

            <div class="form-group">
                <label>Scroll Speed (seconds)</label>
                <input type="range" id="scrollSpeed" min="10" max="60" value="20" step="5" style="width: 100%;">
                <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                    <small style="color: #6e6e73;">Fast (10s)</small>
                    <small style="color: #1d1d1f; font-weight: 600;"><span id="speedValue">20</span>s</small>
                    <small style="color: #6e6e73;">Slow (60s)</small>
                </div>
            </div>

            <button class="btn-submit" onclick="saveAnnouncement()">Save Changes</button>
            <button class="btn-logout" onclick="logout()">Logout</button>

            <div class="preview-section">
                <h3>Live Preview</h3>
                <div class="preview-announcement" id="previewBanner">
                    <div class="preview-announcement-text" id="previewText">
                        Your announcement will appear here...
                    </div>
                </div>
                <p style="margin-top: 12px; font-size: 13px; color: #6e6e73; text-align: center;">
                    Preview updates in real-time as you change settings
                </p>
            </div>
        </div>
    </div>

    <script>
        // Announcement Admin Management
        const ADMIN_CREDENTIALS = {
            username: '0876676466',
            password: '0870019999'
        };

        const STORAGE_KEY = 'techcross_announcement';

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded, checking login status...');
            const isLoggedIn = sessionStorage.getItem('announcement_admin_logged_in');
            if (isLoggedIn === 'true') {
                console.log('Already logged in');
                showManagementSection();
                loadAnnouncementData();
            }
            
            // Setup real-time preview listeners
            setupPreviewListeners();
        });

        // Login function
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            console.log('Login attempt:');
            console.log('  Username:', username);
            console.log('  Password:', password);
            console.log('  Expected username:', ADMIN_CREDENTIALS.username);
            console.log('  Expected password:', ADMIN_CREDENTIALS.password);
            
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                console.log('✅ Login successful!');
                sessionStorage.setItem('announcement_admin_logged_in', 'true');
                showManagementSection();
                loadAnnouncementData();
                showMessage('Login successful!', 'success');
            } else {
                console.log('❌ Login failed!');
                showMessage('Invalid username or password', 'error');
            }
        }

        // Logout function
        function logout() {
            sessionStorage.removeItem('announcement_admin_logged_in');
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('managementSection').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            showMessage('Logged out successfully', 'success');
        }

        // Show management section
        function showManagementSection() {
            console.log('Showing management section...');
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('managementSection').style.display = 'block';
        }

        // Load announcement data
        function loadAnnouncementData() {
            console.log('Loading announcement data...');
            const data = getAnnouncementData();
            
            document.getElementById('announcementEnabled').checked = data.enabled;
            document.getElementById('announcementTextEn').value = data.textEn;
            document.getElementById('announcementTextGa').value = data.textGa;
            document.getElementById('fontSize').value = data.fontSize;
            document.getElementById('fontWeight').value = data.fontWeight;
            document.getElementById('textColor').value = data.textColor;
            document.getElementById('textColorHex').value = data.textColor;
            document.getElementById('bgColor').value = data.bgColor;
            document.getElementById('bgColorHex').value = data.bgColor;
            document.getElementById('scrollSpeed').value = data.scrollSpeed;
            document.getElementById('speedValue').textContent = data.scrollSpeed;
            
            updatePreview();
        }

        // Get announcement data from localStorage
        function getAnnouncementData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch (e) {
                    console.error('Error loading announcement data:', e);
                }
            }
            
            // Default values
            return {
                enabled: false,
                textEn: 'Welcome to Tech Cross Repair Centre! Professional repair services for all your devices.',
                textGa: 'Fáilte go Tech Cross! Seirbhísí deisiúcháin ghairmiúla do do ghléasanna go léir.',
                fontSize: 15,
                fontWeight: '500',
                textColor: '#D4E157',
                bgColor: '#000000',
                scrollSpeed: 20
            };
        }

        // Save announcement
        function saveAnnouncement() {
            const data = {
                enabled: document.getElementById('announcementEnabled').checked,
                textEn: document.getElementById('announcementTextEn').value,
                textGa: document.getElementById('announcementTextGa').value,
                fontSize: parseInt(document.getElementById('fontSize').value),
                fontWeight: document.getElementById('fontWeight').value,
                textColor: document.getElementById('textColor').value,
                bgColor: document.getElementById('bgColor').value,
                scrollSpeed: parseInt(document.getElementById('scrollSpeed').value)
            };
            
            console.log('Saving announcement:', data);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            showMessage('Announcement settings saved successfully!', 'success');
            
            // Trigger update on main page if it's open
            window.dispatchEvent(new Event('announcementUpdated'));
        }

        // Setup preview listeners
        function setupPreviewListeners() {
            // Text inputs
            const textEnInput = document.getElementById('announcementTextEn');
            const textGaInput = document.getElementById('announcementTextGa');
            if (textEnInput) textEnInput.addEventListener('input', updatePreview);
            if (textGaInput) textGaInput.addEventListener('input', updatePreview);
            
            // Font size
            const fontSizeInput = document.getElementById('fontSize');
            if (fontSizeInput) fontSizeInput.addEventListener('input', updatePreview);
            
            // Font weight
            const fontWeightSelect = document.getElementById('fontWeight');
            if (fontWeightSelect) fontWeightSelect.addEventListener('change', updatePreview);
            
            // Text color
            const textColorInput = document.getElementById('textColor');
            const textColorHexInput = document.getElementById('textColorHex');
            if (textColorInput) {
                textColorInput.addEventListener('input', (e) => {
                    textColorHexInput.value = e.target.value;
                    updatePreview();
                });
            }
            if (textColorHexInput) {
                textColorHexInput.addEventListener('input', (e) => {
                    const color = e.target.value;
                    if (/^#[0-9A-F]{6}$/i.test(color)) {
                        textColorInput.value = color;
                        updatePreview();
                    }
                });
            }
            
            // Background color
            const bgColorInput = document.getElementById('bgColor');
            const bgColorHexInput = document.getElementById('bgColorHex');
            if (bgColorInput) {
                bgColorInput.addEventListener('input', (e) => {
                    bgColorHexInput.value = e.target.value;
                    updatePreview();
                });
            }
            if (bgColorHexInput) {
                bgColorHexInput.addEventListener('input', (e) => {
                    const color = e.target.value;
                    if (/^#[0-9A-F]{6}$/i.test(color)) {
                        bgColorInput.value = color;
                        updatePreview();
                    }
                });
            }
            
            // Scroll speed
            const scrollSpeedInput = document.getElementById('scrollSpeed');
            const speedValueSpan = document.getElementById('speedValue');
            if (scrollSpeedInput && speedValueSpan) {
                scrollSpeedInput.addEventListener('input', (e) => {
                    speedValueSpan.textContent = e.target.value;
                    updatePreview();
                });
            }
        }

        // Update preview
        function updatePreview() {
            const textEn = document.getElementById('announcementTextEn')?.value || 'Your announcement will appear here...';
            const fontSize = document.getElementById('fontSize')?.value || 15;
            const fontWeight = document.getElementById('fontWeight')?.value || '500';
            const textColor = document.getElementById('textColor')?.value || '#D4E157';
            const bgColor = document.getElementById('bgColor')?.value || '#000000';
            const scrollSpeed = document.getElementById('scrollSpeed')?.value || 20;
            
            const previewBanner = document.getElementById('previewBanner');
            const previewText = document.getElementById('previewText');
            
            if (previewBanner && previewText) {
                previewBanner.style.backgroundColor = bgColor;
                previewText.style.color = textColor;
                previewText.style.fontSize = fontSize + 'px';
                previewText.style.fontWeight = fontWeight;
                previewText.style.animationDuration = scrollSpeed + 's';
                previewText.textContent = textEn;
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            if (messageDiv) {
                messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 3000);
            }
        }

        // Enter key to login
        document.addEventListener('keypress', (e) => {
            const loginSection = document.getElementById('loginSection');
            if (e.key === 'Enter' && loginSection && loginSection.style.display !== 'none') {
                login();
            }
        });

        console.log('Script loaded successfully');
        console.log('Admin credentials:', ADMIN_CREDENTIALS);
    </script>
</body>
</html>
