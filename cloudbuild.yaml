steps:
  # 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:$SHORT_SHA'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'
      - '--no-cache'
      - '.'
  
  # 推送镜像到 Artifact Registry (带版本标签)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:$SHORT_SHA'
  
  # 推送镜像到 Artifact Registry (latest标签)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'
  
  # 部署到 Cloud Run - 使用latest标签并强制更新
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'teschcross'
      - '--image'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'
      - '--region'
      - 'europe-west3'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'PORT=8080,DEPLOYED_AT=$BUILD_ID'
      - '--revision-suffix'
      - '$SHORT_SHA'

# 镜像列表
images:
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:$SHORT_SHA'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'

# 构建超时
timeout: '1200s'

# 选项
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'
