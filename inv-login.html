<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进销存系统登录 - Tech Cross</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #f5f5f7;
            min-height: 100vh;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 22px;
        }

        .login-logo {
            margin-bottom: 32px;
            text-align: center;
        }

        .login-logo img {
            height: 80px;
            display: block;
            margin: 0 auto;
        }

        .login-box {
            background: #fff;
            padding: 48px;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            max-width: 420px;
            width: 100%;
        }

        .login-box h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 6px;
            text-align: center;
            color: #1d1d1f;
        }

        .login-box .login-subtitle {
            color: #6e6e73;
            text-align: center;
            margin-bottom: 32px;
            font-size: 15px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-field label {
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
        }

        .form-field input {
            padding: 14px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            background: #fff;
            transition: all 0.3s;
            color: #1d1d1f;
        }

        .form-field input:focus {
            outline: none;
            border-color: #D4E157;
            box-shadow: 0 0 0 4px rgba(212, 225, 87, 0.15);
        }

        .form-field input::placeholder {
            color: #86868b;
        }

        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .captcha-row .form-field {
            flex: 1;
        }

        .captcha-question {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .captcha-text {
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            color: #1d1d1f;
            white-space: nowrap;
            text-align: center;
            min-width: 120px;
            user-select: none;
            letter-spacing: 1px;
        }

        .captcha-refresh {
            background: none;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            color: #6e6e73;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .captcha-refresh:hover {
            background: #f5f5f7;
            border-color: #D4E157;
            color: #1d1d1f;
        }

        .captcha-refresh:active {
            transform: scale(0.95);
        }

        .captcha-refresh svg {
            width: 20px;
            height: 20px;
        }

        .captcha-refresh.spinning svg {
            animation: spin 0.5s ease-in-out;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-error {
            background: #fef2f2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
            border: 1px solid #fecaca;
            line-height: 1.5;
        }

        .login-error.show {
            display: block;
            animation: shakeError 0.4s ease-in-out;
        }

        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .btn-login {
            background: #D4E157;
            color: #000;
            padding: 14px 24px;
            border: none;
            border-radius: 980px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: #c5d148;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 225, 87, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-login .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }

        .btn-login.loading .btn-text {
            display: none;
        }

        .btn-login.loading .spinner {
            display: block;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #86868b;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }

            .login-box h1 {
                font-size: 24px;
            }

            .captcha-row {
                flex-direction: column;
                gap: 12px;
            }

            .captcha-question {
                justify-content: center;
            }

            .captcha-text {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <img src="logo.png" alt="Tech Cross">
        </div>

        <div class="login-box">
            <h1>进销存系统</h1>
            <p class="login-subtitle">请登录以继续</p>

            <form class="login-form" id="loginForm" autocomplete="off">
                <div class="form-field">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required autofocus autocomplete="username">
                </div>

                <div class="form-field">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>

                <div class="form-field">
                    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:14px 16px;border:1px solid #d2d2d7;border-radius:12px;background:#f5f5f7;transition:all 0.2s;">
                        <input type="checkbox" id="humanCheck" style="width:20px;height:20px;cursor:pointer;">
                        <span style="font-size:15px;">我不是机器人</span>
                    </label>
                </div>

                <div class="login-error" id="loginError" role="alert"></div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">登 录</span>
                    <span class="spinner"></span>
                </button>
            </form>

            <div class="login-footer">
                Tech Cross 内部管理系统
            </div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ─── State ──────────────────────────────────────────────────────
        let captchaId = null;

        // ─── DOM refs ───────────────────────────────────────────────────
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const humanCheckbox = document.getElementById('humanCheck');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');

        // ─── Check if already logged in ─────────────────────────────────
        (function checkExistingSession() {
            const token = localStorage.getItem('inv_token');
            const user = localStorage.getItem('inv_user');
            if (token && user) {
                try {
                    const userData = JSON.parse(user);
                    redirectByRole(userData.role);
                } catch (e) {
                    // Invalid stored data, clear and stay on login
                    localStorage.removeItem('inv_token');
                    localStorage.removeItem('inv_user');
                }
            }
        })();

        // ─── Show / hide error ──────────────────────────────────────────
        function showError(message) {
            loginError.textContent = message;
            loginError.classList.add('show');
        }

        function hideError() {
            loginError.classList.remove('show');
        }

        // ─── Redirect by role ───────────────────────────────────────────
        function redirectByRole(role) {
            if (role === 'admin') {
                window.location.href = 'inv-products.html';
            } else {
                window.location.href = 'inv-pos.html';
            }
        }

        // ─── Set loading state ──────────────────────────────────────────
        function setLoading(loading) {
            if (loading) {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        // ─── Login handler ──────────────────────────────────────────────
        async function handleLogin(e) {
            e.preventDefault();
            hideError();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username) { showError('请输入用户名'); usernameInput.focus(); return; }
            if (!password) { showError('请输入密码'); passwordInput.focus(); return; }
            if (!humanCheckbox.checked) { showError('请勾选"我不是机器人"'); return; }

            setLoading(true);

            try {
                const res = await fetch('/api/inv/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, humanCheck: true })
                });

                const data = await res.json();

                if (!res.ok) {
                    if (res.status === 423) {
                        const minutes = data.remainingMinutes || 15;
                        showError('账号已锁定，请 ' + minutes + ' 分钟后再试');
                    } else {
                        showError(data.error || '登录失败，请重试');
                    }
                    return;
                }

                localStorage.setItem('inv_token', data.token);
                localStorage.setItem('inv_user', JSON.stringify(data.user));
                redirectByRole(data.user.role);

            } catch (err) {
                showError('网络错误，请检查网络连接后重试');
            } finally {
                setLoading(false);
            }
        }

        // ─── Event listeners ────────────────────────────────────────────
        form.addEventListener('submit', handleLogin);

        [usernameInput, passwordInput].forEach(function(input) {
            input.addEventListener('input', hideError);
        });
        humanCheckbox.addEventListener('change', hideError);
    })();
    </script>
</body>
</html>
