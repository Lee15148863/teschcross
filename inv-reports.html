<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报表中心 - Tech Cross 进销存</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;background:#f5f5f7;color:#1d1d1f;}
        .layout{display:flex;height:100vh;}
        .sidebar{width:220px;background:#1d1d1f;color:#f5f5f7;display:flex;flex-direction:column;flex-shrink:0;}
        .sidebar .logo{padding:20px;text-align:center;border-bottom:1px solid #333;}.sidebar .logo img{height:36px;}.sidebar .logo span{display:block;font-size:12px;color:#86868b;margin-top:4px;}
        .sidebar nav{flex:1;overflow-y:auto;padding:12px 0;}
        .sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#b0b0b5;text-decoration:none;font-size:14px;transition:all .15s;border-left:3px solid transparent;}
        .sidebar nav a:hover{background:#2a2a2d;color:#f5f5f7;}.sidebar nav a.active{background:#2a2a2d;color:#D4E157;border-left-color:#D4E157;font-weight:600;}
        .sidebar nav a .icon{width:20px;text-align:center;font-size:16px;}
        .sidebar .nav-section{padding:16px 20px 6px;font-size:11px;color:#6e6e73;text-transform:uppercase;letter-spacing:1px;}
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .topbar{height:56px;background:#fff;border-bottom:1px solid #e5e5e7;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
        .topbar h2{font-size:18px;font-weight:600;}.topbar .user-info{display:flex;align-items:center;gap:12px;font-size:14px;color:#6e6e73;}.topbar .user-info strong{color:#1d1d1f;}
        .btn-logout{padding:6px 14px;border-radius:980px;border:1px solid #d2d2d7;background:#fff;font-size:13px;cursor:pointer;transition:all .2s;}.btn-logout:hover{background:#ff3b30;color:#fff;border-color:#ff3b30;}
        .content{flex:1;overflow-y:auto;padding:24px;}
        .card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:24px;margin-bottom:20px;}
        .card h3{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f2;}
        .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;}
        .toolbar input,.toolbar select{padding:8px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;background:#fff;}
        .toolbar input:focus,.toolbar select:focus{outline:none;border-color:#D4E157;}
        .btn{padding:8px 18px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
        .btn-primary{background:#D4E157;color:#000;}.btn-primary:hover{background:#c5d148;}
        .btn-secondary{background:#f5f5f7;border:1px solid #d2d2d7;color:#1d1d1f;}.btn-secondary:hover{background:#e5e5e7;}
        .btn-sm{padding:5px 12px;font-size:13px;}
        .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
        .badge-active{background:#e8f5e9;color:#2e7d32;}
        .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid #e5e5e7;}
        .tab{padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#6e6e73;transition:all .15s;}
        .tab:hover{color:#1d1d1f;}.tab.active{color:#D4E157;border-bottom-color:#D4E157;font-weight:600;}
        .tab-content{display:none;}.tab-content.active{display:block;}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;}
        .stat-card{background:#f5f5f7;border-radius:12px;padding:20px;text-align:center;}
        .stat-card .stat-value{font-size:28px;font-weight:700;color:#1d1d1f;margin-bottom:4px;}
        .stat-card .stat-label{font-size:13px;color:#6e6e73;}
        table{width:100%;border-collapse:collapse;font-size:14px;}
        thead th{background:#f5f5f7;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:#6e6e73;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e5e5e7;}
        tbody td{padding:10px 12px;border-bottom:1px solid #f0f0f2;vertical-align:middle;}
        tbody tr:hover{background:#fafafa;}
        .no-data{text-align:center;padding:40px;color:#86868b;font-size:15px;}
        .monthly-summary{background:#f0f4c3;border-radius:12px;padding:20px;margin-top:16px;font-family:monospace;font-size:13px;line-height:1.8;white-space:pre-wrap;}
        .toast{position:fixed;top:20px;right:20px;z-index:10000;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.15);transform:translateX(120%);transition:transform .3s ease;max-width:400px;}
        .toast.show{transform:translateX(0);}.toast.success{background:#34c759;color:#fff;}.toast.error{background:#ff3b30;color:#fff;}
        @media print{.sidebar,.topbar,.toolbar,.tabs,.btn{display:none!important;}.layout{display:block;}.main{overflow:visible;}.content{padding:0;}}
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="layout">
    <aside class="sidebar">
        <div class="logo"><img src="logo.png" alt="Tech Cross"><span>进销存管理系统</span></div>
        <nav>
            <div class="nav-section">业务管理 / Business</div>
            <a href="inv-pos.html" data-perm="pos"><span class="icon">💰</span>POS 收银 / Checkout</a>
            <a href="inv-products.html" data-perm="products"><span class="icon">📦</span>商品管理 / Products</a>
            <a href="inv-stock.html" data-perm="stock"><span class="icon">🏭</span>库存管理 / Stock</a>
            <a href="inv-suppliers.html" data-perm="suppliers"><span class="icon">🤝</span>供应商 / Suppliers</a>
            <a href="inv-purchases.html" data-perm="purchases"><span class="icon">🛒</span>采购管理 / Purchases</a>
            <a href="inv-transactions.html" data-perm="transactions"><span class="icon">📋</span>交易记录 / Transactions</a>
            <div class="nav-section">报表与发票 / Reports</div>
            <a href="inv-reports.html" class="active" data-perm="reports"><span class="icon">📊</span>报表中心 / Reports</a>
            <a href="inv-invoices.html" data-perm="invoices"><span class="icon">🧾</span>发票管理 / VAT Invoice</a>
            <a href="inv-expenses.html" data-perm="expenses"><span class="icon">💸</span>支出管理 / Expenses</a>
            <div class="nav-section" id="adminSection" style="display:none;">系统管理 / System</div>
            <a href="inv-settings.html" class="admin-only" style="display:none;" data-perm="settings"><span class="icon">⚙️</span>系统设置 / Settings</a>
            <a href="inv-users.html" class="admin-only" style="display:none;" data-perm="users"><span class="icon">👥</span>用户管理 / Users</a>
        </nav>
    </aside>
    <div class="main">
        <div class="topbar">
            <h2>报表中心 / Reports</h2>
            <div class="user-info"><span>欢迎, <strong id="displayName">-</strong></span><span class="badge badge-active" id="roleBadge">-</span><button class="btn-logout" onclick="logout()">退出登录 / Logout</button></div>
        </div>
        <div class="content">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('daily')">日结报表</div>
                <div class="tab" onclick="switchTab('monthly')">月度报税总结</div>
            </div>

            <!-- Daily Report -->
            <div class="tab-content active" id="tab-daily">
                <div class="card">
                    <div class="toolbar">
                        <input type="date" id="dailyDate">
                        <button class="btn btn-primary" onclick="loadDaily()">查询 / Search</button>
                        <div style="flex:1;"></div>
                        <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印</button>
                        <button class="btn btn-secondary" onclick="exportReport()">📥 导出 / Export</button>
                    </div>
                    <div id="dailyContent"><p class="no-data">请选择日期查询</p></div>
                </div>
            </div>

            <!-- Monthly Report -->
            <div class="tab-content" id="tab-monthly">
                <div class="card">
                    <div class="toolbar">
                        <input type="month" id="monthlyDate">
                        <button class="btn btn-primary" onclick="loadMonthly()">查询 / Search</button>
                        <div style="flex:1;"></div>
                        <button class="btn btn-secondary" onclick="window.print()">🖨️ 打印</button>
                        <button class="btn btn-secondary" onclick="exportReport()">📥 导出 / Export</button>
                    </div>
                    <div id="monthlyContent"><p class="no-data">请选择月份查询</p></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
(function(){
'use strict';
const token=localStorage.getItem('inv_token');
if(!token){window.location.href='inv-login.html';return;}
let user;try{user=JSON.parse(localStorage.getItem('inv_user'));}catch(e){window.location.href='inv-login.html';return;}
if(!user){window.location.href='inv-login.html';return;}
document.getElementById('displayName').textContent=user.displayName||user.username;
document.getElementById('roleBadge').textContent=user.role==='admin'?'管理员':'员工';
if(user.role==='admin'){document.getElementById('adminSection').style.display='';document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');}

// Hide sidebar items based on permissions
var perms=user.permissions||{};
if(user.role==='admin'){document.querySelectorAll('nav a[data-perm]').forEach(function(a){a.style.display='';});}
else{document.querySelectorAll('nav a[data-perm]').forEach(function(a){if(!perms[a.dataset.perm])a.style.display='none';});}

const API='/api/inv';
const headers=()=>({'Content-Type':'application/json','Authorization':'Bearer '+token});
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'success');setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3000);}
function logout(){localStorage.removeItem('inv_token');localStorage.removeItem('inv_user');window.location.href='inv-login.html';}
window.logout=logout;
async function apiFetch(url,opts){opts=opts||{};opts.headers=headers();const r=await fetch(API+url,opts);if(r.status===401){logout();return null;}return r;}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Set defaults
const today=new Date();
document.getElementById('dailyDate').value=today.toISOString().split('T')[0];
document.getElementById('monthlyDate').value=today.toISOString().slice(0,7);

function switchTab(name){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
    document.getElementById('tab-'+name).classList.add('active');
}
window.switchTab=switchTab;

async function loadDaily(){
    const date=document.getElementById('dailyDate').value;
    if(!date){showToast('请选择日期','error');return;}
    var el=document.getElementById('dailyContent');
    el.innerHTML='<p class="no-data">加载中...</p>';
    try{
        var r=await apiFetch('/reports/daily?date='+date);if(!r)return;
        var resp=await r.json();
        // 后端返回 { data: {...} } 或 { message: '...' }
        if(resp.message||!resp.data){
            el.innerHTML='<p class="no-data">📭 '+(resp.message||'当日无交易记录 / No transactions for this date')+'</p>';return;
        }
        var d=resp.data;
        var cashAmt=d.payment?d.payment.cash:0;
        var cardAmt=d.payment?d.payment.card:0;
        var vat=d.vatBreakdown||{};
        var std23=vat.standard23||{};
        var margin=vat.margin||{};
        var reduced=vat.reduced135||{};
        var lyca=vat.lycaCredit||{};
        var exp=d.expenses||{};

        var html='<div class="stat-grid">'+
            '<div class="stat-card"><div class="stat-value">'+d.totalTransactions+'</div><div class="stat-label">交易笔数 / Transactions</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(d.totalSales||0).toFixed(2)+'</div><div class="stat-label">销售总额 / Total Sales</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(cashAmt).toFixed(2)+'</div><div class="stat-label">💵 现金 / Cash</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(cardAmt).toFixed(2)+'</div><div class="stat-label">💳 银行卡 / Card</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(d.totalVatPayable||0).toFixed(2)+'</div><div class="stat-label">应缴VAT / VAT Payable</div></div>'+
            '<div class="stat-card"><div class="stat-value" style="color:'+(d.netCash<0?'#ff3b30':'#34c759')+'">€'+Number(d.netCash||0).toFixed(2)+'</div><div class="stat-label">净现金 / Net Cash'+(d.cashWarning?' ⚠️':'')+'</div></div>'+
        '</div>';

        // VAT 明细表
        html+='<h4 style="margin:16px 0 8px;">VAT 分类明细 / VAT Breakdown</h4><table>'+
            '<thead><tr><th>VAT Category</th><th>Sales (€)</th><th>VAT Payable (€)</th></tr></thead><tbody>'+
            '<tr><td>Standard 23%</td><td>€'+Number(std23.sales||0).toFixed(2)+'</td><td>€'+Number(std23.vatPayable||0).toFixed(2)+'</td></tr>'+
            '<tr><td>Margin Scheme</td><td>€'+Number(margin.sales||0).toFixed(2)+'</td><td>€'+Number(margin.vatPayable||0).toFixed(2)+'</td></tr>'+
            '<tr><td>Reduced 13.5%</td><td>€'+Number(reduced.sales||0).toFixed(2)+'</td><td>€'+Number(reduced.vatPayable||0).toFixed(2)+'</td></tr>'+
            '<tr><td>Lyca Credit</td><td>€'+Number(lyca.sales||0).toFixed(2)+'</td><td>€'+Number(lyca.vatPayable||0).toFixed(2)+'</td></tr>'+
            '<tr style="font-weight:700;background:#f0f4c3;"><td>Total</td><td>€'+Number(d.totalSales||0).toFixed(2)+'</td><td>€'+Number(d.totalVatPayable||0).toFixed(2)+'</td></tr>'+
            '</tbody></table>';

        // Margin 明细
        if(margin.items&&margin.items.length){
            html+='<h4 style="margin:16px 0 8px;">📱 Margin Scheme Items</h4><table>'+
                '<thead><tr><th>Receipt</th><th>Item</th><th>Cost (€)</th><th>Sell (€)</th><th>Margin (€)</th><th>VAT (€)</th></tr></thead><tbody>'+
                margin.items.map(function(m){return '<tr><td style="font-family:monospace;font-size:12px;">'+esc(m.receiptNumber)+'</td><td>'+esc(m.name)+'</td><td>€'+Number(m.costPrice||0).toFixed(2)+'</td><td>€'+Number(m.discountedPrice||m.sellingPrice||0).toFixed(2)+'</td><td>€'+Number(m.margin||0).toFixed(2)+'</td><td>€'+Number(m.vatPayable||0).toFixed(2)+'</td></tr>';}).join('')+
                '</tbody></table>';
        }

        // Lyca 明细
        if(lyca.items&&lyca.items.length){
            html+='<h4 style="margin:16px 0 8px;">📞 Lyca Credit Items ('+lyca.count+' sold)</h4><table>'+
                '<thead><tr><th>Receipt</th><th>Item</th><th>Face Value (€)</th><th>Cost (€)</th><th>Profit (€)</th><th>VAT (€)</th></tr></thead><tbody>'+
                lyca.items.map(function(l){return '<tr><td style="font-family:monospace;font-size:12px;">'+esc(l.receiptNumber)+'</td><td>'+esc(l.name)+'</td><td>€'+Number(l.faceValue||0).toFixed(2)+'</td><td>€'+Number(l.costPrice||0).toFixed(2)+'</td><td>€'+Number(l.profit||0).toFixed(2)+'</td><td>€'+Number(l.totalVat||0).toFixed(2)+'</td></tr>';}).join('')+
                '</tbody></table>';
        }

        // 支出
        if(exp.count>0){
            html+='<h4 style="margin:16px 0 8px;">💸 当日支出 / Expenses ('+exp.count+')</h4>'+
                '<div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">'+
                '<div class="stat-card"><div class="stat-value">€'+Number(exp.total||0).toFixed(2)+'</div><div class="stat-label">支出总额 / Total</div></div>'+
                '<div class="stat-card"><div class="stat-value">€'+Number(exp.cash||0).toFixed(2)+'</div><div class="stat-label">💵 现金支出</div></div>'+
                '<div class="stat-card"><div class="stat-value">€'+Number(exp.card||0).toFixed(2)+'</div><div class="stat-label">💳 卡支出</div></div>'+
                '</div>';
            if(exp.byCategory){
                var cats=Object.keys(exp.byCategory);
                if(cats.length){
                    html+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">'+
                        cats.map(function(k){return '<div style="background:#f5f5f7;border-radius:8px;padding:8px 14px;font-size:13px;">'+esc(k)+': <strong>€'+Number(exp.byCategory[k]).toFixed(2)+'</strong></div>';}).join('')+
                    '</div>';
                }
            }
        }

        el.innerHTML=html;
    }catch(e){showToast('加载失败: '+e.message,'error');}
}
window.loadDaily=loadDaily;

async function loadMonthly(){
    const month=document.getElementById('monthlyDate').value;
    if(!month){showToast('请选择月份','error');return;}
    var el=document.getElementById('monthlyContent');
    el.innerHTML='<p class="no-data">加载中...</p>';
    try{
        var r=await apiFetch('/reports/monthly?month='+month);if(!r)return;
        var resp=await r.json();
        if(resp.message||!resp.data){el.innerHTML='<p class="no-data">📭 '+(resp.message||'该月无交易记录 / No transactions for this month')+'</p>';return;}
        var d=resp.data;
        var s=d.summary||{};
        var days=d.dailyData||[];
        var exp=s.expenses||{};

        var html='<h4 style="margin-bottom:12px;">月度报表 / Monthly Report — '+esc(d.month)+'</h4>';

        // 汇总卡片
        html+='<div class="stat-grid">'+
            '<div class="stat-card"><div class="stat-value">€'+Number(s.totalSales||0).toFixed(2)+'</div><div class="stat-label">总销售 / Total Sales</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(s.totalCash||0).toFixed(2)+'</div><div class="stat-label">💵 现金 / Cash</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(s.totalCard||0).toFixed(2)+'</div><div class="stat-label">💳 银行卡 / Card</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(s.totalVatPayable||0).toFixed(2)+'</div><div class="stat-label">应缴VAT / VAT Payable</div></div>'+
            '<div class="stat-card"><div class="stat-value">€'+Number(exp.total||0).toFixed(2)+'</div><div class="stat-label">💸 支出 / Expenses</div></div>'+
            '<div class="stat-card"><div class="stat-value" style="color:'+(s.netCash<0?'#ff3b30':'#34c759')+'">€'+Number(s.netCash||0).toFixed(2)+'</div><div class="stat-label">净现金 / Net Cash'+(s.cashWarning?' ⚠️':'')+'</div></div>'+
        '</div>';

        // 每日明细表
        if(days.length){
            html+='<h4 style="margin:16px 0 8px;">每日明细 / Daily Breakdown</h4><table>'+
                '<thead><tr><th>日期 / Date</th><th>Sales (€)</th><th>💵 Cash</th><th>💳 Card</th><th>Std 23% VAT</th><th>Margin VAT</th><th>13.5% VAT</th><th>Lyca VAT</th><th>Day VAT</th><th>Expenses</th><th>Net Cash</th></tr></thead><tbody>'+
                days.map(function(day){
                    var nc=day.netCash||0;
                    return '<tr>'+
                        '<td>'+esc(day.date)+'</td>'+
                        '<td>€'+Number(day.totalSales||0).toFixed(2)+'</td>'+
                        '<td>€'+Number(day.cash||0).toFixed(2)+'</td>'+
                        '<td>€'+Number(day.card||0).toFixed(2)+'</td>'+
                        '<td>€'+Number((day.standard23||{}).vatPayable||0).toFixed(2)+'</td>'+
                        '<td>€'+Number((day.margin||{}).vatPayable||0).toFixed(2)+'</td>'+
                        '<td>€'+Number((day.reduced135||{}).vatPayable||0).toFixed(2)+'</td>'+
                        '<td>€'+Number((day.lycaCredit||{}).vatPayable||0).toFixed(2)+'</td>'+
                        '<td style="font-weight:600;">€'+Number(day.dailyVatPayable||0).toFixed(2)+'</td>'+
                        '<td>€'+Number(day.expenses||0).toFixed(2)+'</td>'+
                        '<td style="color:'+(nc<0?'#ff3b30':'#34c759')+';font-weight:600;">€'+nc.toFixed(2)+(day.cashWarning?' ⚠️':'')+'</td>'+
                    '</tr>';
                }).join('')+
                '</tbody></table>';
        }

        // VAT 汇总
        html+='<div class="monthly-summary">'+
'=== Month-End VAT Summary / 月末VAT汇总 ===\n'+
'Total Sales:          €'+Number(s.totalSales||0).toFixed(2)+'\n'+
'Cash Total:           €'+Number(s.totalCash||0).toFixed(2)+'\n'+
'Card Total:           €'+Number(s.totalCard||0).toFixed(2)+'\n'+
'─────────────────────────────────\n'+
'Standard 23% VAT:     €'+Number(s.standard23VatTotal||0).toFixed(2)+'\n'+
'Margin Scheme VAT:    €'+Number(s.marginVatTotal||0).toFixed(2)+'\n'+
'Reduced 13.5% VAT:    €'+Number(s.reduced135VatTotal||0).toFixed(2)+'\n'+
'Lyca Credit VAT:      €'+Number(s.lycaCreditVatTotal||0).toFixed(2)+'\n'+
'─────────────────────────────────\n'+
'Total VAT Payable:    €'+Number(s.totalVatPayable||0).toFixed(2)+'\n'+
'─────────────────────────────────\n'+
'Expenses Total:       €'+Number(exp.total||0).toFixed(2)+'\n'+
'  Cash Expenses:      €'+Number(exp.cash||0).toFixed(2)+'\n'+
'  Card Expenses:      €'+Number(exp.card||0).toFixed(2)+'\n'+
'─────────────────────────────────\n'+
'Net Cash:             €'+Number(s.netCash||0).toFixed(2)+(s.cashWarning?'  ⚠️ '+s.cashWarning:'')+'\n'+
'</div>';

        // 支出分类
        if(exp.byCategory){
            var cats=Object.keys(exp.byCategory);
            if(cats.length){
                html+='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">'+
                    cats.map(function(k){return '<div style="background:#f5f5f7;border-radius:8px;padding:8px 14px;font-size:13px;">'+esc(k)+': <strong>€'+Number(exp.byCategory[k]).toFixed(2)+'</strong></div>';}).join('')+
                '</div>';
            }
        }

        el.innerHTML=html;
    }catch(e){showToast('加载失败: '+e.message,'error');}
}
window.loadMonthly=loadMonthly;

async function exportReport(){
    try{
        const r=await apiFetch('/reports/export');if(!r)return;
        if(!r.ok){showToast('导出失败','error');return;}
        const blob=await r.blob();
        const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='report.json';a.click();URL.revokeObjectURL(a.href);
        showToast('导出成功');
    }catch(e){showToast('导出失败','error');}
}
window.exportReport=exportReport;

loadDaily();
})();
</script>
