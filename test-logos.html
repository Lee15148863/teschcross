<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Test - Tech Cross</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px;
            background: #f5f5f7;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        .info {
            text-align: center;
            color: #6e6e73;
            margin-bottom: 40px;
            font-size: 17px;
        }
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .logo-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .logo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .logo-card img {
            width: 120px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 16px;
        }
        .logo-card h3 {
            margin: 0;
            font-size: 18px;
            color: #1d1d1f;
        }
        .logo-card .status {
            margin-top: 8px;
            font-size: 14px;
            color: #34c759;
            font-weight: 600;
        }
        .back-btn {
            display: block;
            width: 200px;
            margin: 40px auto 0;
            padding: 14px 24px;
            background: #0071e3;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            text-align: center;
            font-size: 17px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: #0077ed;
        }
    </style>
</head>
<body>
    <h1>Brand Logo Test</h1>
    <p class="info">All logos have been updated to simple, clean designs with brand colors</p>
    <div class="logo-grid">
        <div class="logo-card">
            <img src="logos/apple.svg" alt="Apple">
            <h3>Apple</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/samsung.svg" alt="Samsung">
            <h3>Samsung</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/xiaomi.svg" alt="Xiaomi">
            <h3>Xiaomi</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/google.svg" alt="Google">
            <h3>Google</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/oneplus.svg" alt="OnePlus">
            <h3>OnePlus</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/oppo.svg" alt="OPPO">
            <h3>OPPO</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/huawei.svg" alt="Huawei">
            <h3>Huawei</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/honor.svg" alt="Honor">
            <h3>Honor</h3>
            <p class="status">✓ Updated</p>
        </div>
        <div class="logo-card">
            <img src="logos/other.svg" alt="Other Brands">
            <h3>Other Brands</h3>
            <p class="status">✓ Updated</p>
        </div>
    </div>
    <a href="pricing.html" class="back-btn">Go to Pricing Page</a>
</body>
</html>
