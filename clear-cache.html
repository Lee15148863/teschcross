<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Cache - Tech Cross</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            text-align: center;
            background: #f5f5f7;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1d1d1f;
            margin-bottom: 20px;
        }
        button {
            background: #0071e3;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 17px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #0077ed;
        }
        .danger {
            background: #ff3b30;
        }
        .danger:hover {
            background: #ff453a;
        }
        .success {
            background: #34c759;
        }
        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        #message.show {
            display: block;
        }
        #message.success {
            background: #d1f2dd;
            color: #1e4620;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Pricing Cache</h1>
        <p>Click the button below to clear old pricing data and reload with new iPhone models and services.</p>
        
        <button onclick="clearCache()" class="danger">Clear Cache & Reload Data</button>
        <button onclick="window.location.href='pricing.html'" class="success">Go to Pricing Page</button>
        <button onclick="window.location.href='admin.html'">Go to Admin Page</button>
        
        <div id="message"></div>
    </div>

    <script>
        function clearCache() {
            // Clear all pricing related data
            localStorage.removeItem('techcross_pricing_data');
            localStorage.removeItem('techcross_pricing_version');
            
            const message = document.getElementById('message');
            message.textContent = '✅ Cache cleared successfully! The page will reload in 2 seconds...';
            message.className = 'message show success';
            
            setTimeout(() => {
                window.location.reload();
            }, 2000);
        }
        
        // Show current status
        window.addEventListener('DOMContentLoaded', function() {
            const version = localStorage.getItem('techcross_pricing_version');
            const hasData = localStorage.getItem('techcross_pricing_data');
            
            if (version) {
                document.querySelector('p').innerHTML += `<br><br><small style="color: #86868b;">Current version: ${version}<br>Data exists: ${hasData ? 'Yes' : 'No'}</small>`;
            }
        });
    </script>
</body>
</html>
