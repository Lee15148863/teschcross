steps:
  # 构建 Docker 镜像
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:$_TAG'
      - '-t'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'
      - '--no-cache'
      - '.'

  # 推送镜像到 Artifact Registry (带版本标签)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:$_TAG'

  # 推送镜像到 Artifact Registry (latest标签)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'

  # 部署到 Cloud Run Staging — storeflow-test-mainpos
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'storeflow-test-mainpos'
      - '--image'
      - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--vpc-connector'
      - 'storeflow-connector'
      - '--vpc-egress'
      - 'all-traffic'
      - '--revision-suffix'
      - '$_TAG'

  # 获取并显示Cloud Run URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe storeflow-test-mainpos --region=europe-west1 --format='value(status.url)')
        echo "=========================================="
        echo "Staging Deployment Successful!"
        echo "Test Tenant URL: $$SERVICE_URL"
        echo "=========================================="

# 镜像列表
images:
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:$_TAG'
  - 'europe-west3-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/teschcross:latest'

# 默认 _TAG 值 — push staging 触发时自动填入 $SHORT_SHA
substitutions:
  _TAG: 'staging'

# 构建超时
timeout: '1200s'

# 选项
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
