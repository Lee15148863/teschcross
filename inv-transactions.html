<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易记录 - Tech Cross 进销存</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;background:#f5f5f7;color:#1d1d1f;}
        .layout{display:flex;height:100vh;}
        .sidebar{width:220px;background:#1d1d1f;color:#f5f5f7;display:flex;flex-direction:column;flex-shrink:0;}
        .sidebar .logo{padding:20px;text-align:center;border-bottom:1px solid #333;}.sidebar .logo img{height:36px;}.sidebar .logo span{display:block;font-size:12px;color:#86868b;margin-top:4px;}
        .sidebar nav{flex:1;overflow-y:auto;padding:12px 0;}
        .sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:#b0b0b5;text-decoration:none;font-size:14px;transition:all .15s;border-left:3px solid transparent;}
        .sidebar nav a:hover{background:#2a2a2d;color:#f5f5f7;}.sidebar nav a.active{background:#2a2a2d;color:#D4E157;border-left-color:#D4E157;font-weight:600;}
        .sidebar nav a .icon{width:20px;text-align:center;font-size:16px;}
        .sidebar .nav-section{padding:16px 20px 6px;font-size:11px;color:#6e6e73;text-transform:uppercase;letter-spacing:1px;}
        .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
        .topbar{height:56px;background:#fff;border-bottom:1px solid #e5e5e7;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
        .topbar h2{font-size:18px;font-weight:600;}.topbar .user-info{display:flex;align-items:center;gap:12px;font-size:14px;color:#6e6e73;}.topbar .user-info strong{color:#1d1d1f;}
        .btn-logout{padding:6px 14px;border-radius:980px;border:1px solid #d2d2d7;background:#fff;font-size:13px;cursor:pointer;transition:all .2s;}.btn-logout:hover{background:#ff3b30;color:#fff;border-color:#ff3b30;}
        .content{flex:1;overflow-y:auto;padding:24px;}
        .card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:24px;margin-bottom:20px;}
        .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:16px;}
        .toolbar input,.toolbar select{padding:8px 14px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;background:#fff;}
        .toolbar input:focus,.toolbar select:focus{outline:none;border-color:#D4E157;}
        .btn{padding:8px 18px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;}
        .btn-primary{background:#D4E157;color:#000;}.btn-primary:hover{background:#c5d148;}
        .btn-secondary{background:#f5f5f7;border:1px solid #d2d2d7;color:#1d1d1f;}.btn-secondary:hover{background:#e5e5e7;}
        .btn-danger{background:#ff3b30;color:#fff;}.btn-danger:hover{background:#e0342d;}
        .btn-success{background:#34c759;color:#fff;}.btn-success:hover{background:#2db84e;}
        .btn-sm{padding:5px 12px;font-size:13px;}
        table{width:100%;border-collapse:collapse;font-size:14px;}
        thead th{background:#f5f5f7;padding:10px 12px;text-align:left;font-weight:600;font-size:12px;color:#6e6e73;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e5e5e7;}
        tbody td{padding:10px 12px;border-bottom:1px solid #f0f0f2;vertical-align:middle;}
        tbody tr:hover{background:#fafafa;}
        .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
        .badge-active{background:#e8f5e9;color:#2e7d32;}.badge-exported{background:#e3f2fd;color:#1565c0;}
        .modal-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
        .modal-overlay.show{display:flex;}
        .modal{background:#fff;border-radius:18px;padding:32px;max-width:650px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);}
        .modal h3{font-size:20px;margin-bottom:20px;}
        .detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f2;font-size:14px;}
        .detail-row .label{color:#6e6e73;}.detail-row .value{font-weight:500;}
        .detail-items{margin-top:16px;}
        .detail-items table{font-size:13px;}
        .modal-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:24px;}
        .toast{position:fixed;top:20px;right:20px;z-index:10000;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.15);transform:translateX(120%);transition:transform .3s ease;max-width:400px;}
        .toast.show{transform:translateX(0);}.toast.success{background:#34c759;color:#fff;}.toast.error{background:#ff3b30;color:#fff;}
    </style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="layout">
    <aside class="sidebar">
        <div class="logo"><img src="logo.png" alt="Tech Cross"><span>进销存管理系统</span></div>
        <nav>
            <div class="nav-section">业务管理</div>
            <a href="inv-pos.html" data-perm="pos"><span class="icon">💰</span>POS 收银</a>
            <a href="inv-products.html" data-perm="products"><span class="icon">📦</span>商品管理</a>
            <a href="inv-stock.html" data-perm="stock"><span class="icon">🏭</span>库存管理</a>
            <a href="inv-suppliers.html" data-perm="suppliers"><span class="icon">🤝</span>供应商管理</a>
            <a href="inv-purchases.html" data-perm="purchases"><span class="icon">🛒</span>采购管理</a>
            <a href="inv-transactions.html" class="active" data-perm="transactions"><span class="icon">📋</span>交易记录</a>
            <div class="nav-section">报表与发票</div>
            <a href="inv-reports.html" data-perm="reports"><span class="icon">📊</span>报表中心</a>
            <a href="inv-invoices.html" data-perm="invoices"><span class="icon">🧾</span>VAT Invoice</a>
            <div class="nav-section" id="adminSection" style="display:none;">系统管理</div>
            <a href="inv-settings.html" class="admin-only" style="display:none;" data-perm="settings"><span class="icon">⚙️</span>系统设置</a>
            <a href="inv-users.html" class="admin-only" style="display:none;" data-perm="users"><span class="icon">👥</span>用户管理</a>
        </nav>
    </aside>
    <div class="main">
        <div class="topbar">
            <h2>Transactions / 交易记录</h2>
            <div class="user-info"><span>欢迎, <strong id="displayName">-</strong></span><span class="badge badge-active" id="roleBadge">-</span><button class="btn-logout" onclick="logout()">退出登录</button></div>
        </div>
        <div class="content">
            <div class="card">
                <div class="toolbar">
                    <input type="text" id="searchReceipt" placeholder="Receipt # search..." style="width:180px;" onkeydown="if(event.key==='Enter')loadTransactions()">
                    <input type="date" id="startDate">
                    <span style="color:#86868b;">to</span>
                    <input type="date" id="endDate">
                    <button class="btn btn-primary" onclick="loadTransactions()">Search</button>
                    <button class="btn btn-secondary" onclick="loadToday()">Today</button>
                    <div style="flex:1;"></div>
                    <button class="btn btn-secondary" onclick="exportTx('csv')">Export CSV</button>
                    <button class="btn btn-danger btn-sm admin-only" style="display:none;" onclick="batchDelete()">Batch Delete Exported</button>
                </div>
                <table>
                    <thead><tr><th>单号</th><th>时间</th><th>商品数</th><th>总金额 (€)</th><th>支付方式</th><th>标记</th><th>操作</th></tr></thead>
                    <tbody id="txTable"><tr><td colspan="7" style="text-align:center;color:#86868b;padding:40px;">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <h3>交易详情</h3>
        <div id="detailContent"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('detailModal').classList.remove('show')">关闭</button>
        </div>
    </div>
</div>

<!-- Hidden batch delete trigger (admin only) -->
<img src="logo.png" alt="" class="admin-only" style="display:none;position:fixed;bottom:16px;right:16px;width:48px;height:48px;opacity:0.2;cursor:pointer;z-index:100;border-radius:50%;transition:opacity 0.2s;" onclick="batchDelete()" onmouseover="this.style.opacity='0.5'" onmouseout="this.style.opacity='0.2'" title="">

<!-- Refund Method Dialog -->
<div id="refundDialog" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:18px;padding:32px;max-width:360px;width:90%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.2);">
        <h3 style="font-size:20px;margin-bottom:8px;">↩️ Refund</h3>
        <p style="font-size:14px;color:#6e6e73;margin-bottom:20px;" id="refundDialogInfo"></p>
        <p style="font-size:14px;margin-bottom:20px;">Select refund method:</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
            <button onclick="confirmRefund('cash')" style="padding:12px 24px;border:none;border-radius:12px;background:#34c759;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">💵 Cash</button>
            <button onclick="confirmRefund('card')" style="padding:12px 24px;border:none;border-radius:12px;background:#0071e3;color:#fff;font-size:15px;font-weight:600;cursor:pointer;">💳 Card</button>
            <button onclick="cancelRefund()" style="padding:12px 24px;border:none;border-radius:12px;background:#f5f5f7;border:1px solid #d2d2d7;color:#1d1d1f;font-size:15px;cursor:pointer;">Cancel</button>
        </div>
    </div>
</div>

<script>
(function(){
'use strict';
const token=localStorage.getItem('inv_token');
if(!token){window.location.href='inv-login.html';return;}
let user;try{user=JSON.parse(localStorage.getItem('inv_user'));}catch(e){window.location.href='inv-login.html';return;}
if(!user){window.location.href='inv-login.html';return;}
document.getElementById('displayName').textContent=user.displayName||user.username;
document.getElementById('roleBadge').textContent=user.role==='admin'?'管理员':'员工';
const isAdmin=user.role==='admin';
if(isAdmin){document.getElementById('adminSection').style.display='';document.querySelectorAll('.admin-only').forEach(el=>el.style.display='');}

// Hide sidebar items based on permissions
var perms=user.permissions||{};
if(isAdmin){document.querySelectorAll('nav a[data-perm]').forEach(function(a){a.style.display='';});}
else{document.querySelectorAll('nav a[data-perm]').forEach(function(a){if(!perms[a.dataset.perm])a.style.display='none';});}

const API='/api/inv';
const headers=()=>({'Content-Type':'application/json','Authorization':'Bearer '+token});
function showToast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'success');setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>t.classList.remove('show'),3000);}
function logout(){localStorage.removeItem('inv_token');localStorage.removeItem('inv_user');window.location.href='inv-login.html';}
window.logout=logout;
async function apiFetch(url,opts){opts=opts||{};opts.headers=headers();const r=await fetch(API+url,opts);if(r.status===401){logout();return null;}return r;}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// Set default dates
const today=new Date();
document.getElementById('endDate').value=today.toISOString().split('T')[0];
const weekAgo=new Date(today);weekAgo.setDate(weekAgo.getDate()-30);
document.getElementById('startDate').value=weekAgo.toISOString().split('T')[0];

async function loadTransactions(){
    const q=document.getElementById('searchReceipt').value.trim();
    const start=document.getElementById('startDate').value;
    const end=document.getElementById('endDate').value;
    let url='/transactions?limit=100';
    if(q)url+='&q='+encodeURIComponent(q);
    if(start)url+='&startDate='+start;
    if(end)url+='&endDate='+end;
    try{
        const r=await apiFetch(url);if(!r)return;
        const data=await r.json();
        const list=data.data||[];
        const tb=document.getElementById('txTable');
        if(!list.length){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:#86868b;padding:40px;">No transactions found</td></tr>';return;}
        tb.innerHTML=list.map(tx=>{
            const isRefund=tx.totalAmount<0;
            const amountStyle=isRefund?'color:#ff3b30;':'';
            return `<tr>
            <td style="font-family:monospace;font-size:13px;">${isRefund?'↩️ ':''}${esc(tx.receiptNumber)}</td>
            <td>${new Date(tx.createdAt).toLocaleString('en-IE')}</td>
            <td>${tx.items?tx.items.length:0}</td>
            <td style="${amountStyle}">€${Number(tx.totalAmount).toFixed(2)}</td>
            <td>${tx.paymentMethod==='split'?'💳+💵':tx.paymentMethod==='cash'?'💵 Cash':'💳 Card'}</td>
            <td>${tx.exported?'<span class="badge badge-exported">Exported</span>':''}</td>
            <td>
                <button class="btn btn-secondary btn-sm" onclick="viewDetail('${tx._id}')">详情</button>
                <button class="btn btn-secondary btn-sm" onclick="reprintReceipt('${tx._id}')">🖨️</button>
                ${tx.totalAmount>=0&&(isAdmin||perms.refund)?`<button class="btn btn-sm" style="background:#ff9500;color:#fff;" onclick="refundTx('${esc(tx.receiptNumber)}')">↩️ Refund</button>`:''}
                ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="silentDelete('${tx._id}')">删除</button>`:''}
            </td>
        </tr>`}).join('');
    }catch(e){showToast('加载失败','error');}
}

async function viewDetail(id){
    try{
        const r=await apiFetch('/transactions/'+id);if(!r)return;
        const tx=await r.json();
        let html=`
            <div class="detail-row"><span class="label">单号</span><span class="value">${esc(tx.receiptNumber)}</span></div>
            <div class="detail-row"><span class="label">时间</span><span class="value">${new Date(tx.createdAt).toLocaleString('zh-CN')}</span></div>
            <div class="detail-row"><span class="label">支付方式</span><span class="value">${tx.paymentMethod==='cash'?'现金':'银行卡'}</span></div>
            <div class="detail-row"><span class="label">总金额</span><span class="value">€${Number(tx.totalAmount).toFixed(2)}</span></div>
            <div class="detail-row"><span class="label">Standard VAT</span><span class="value">€${Number(tx.standardVatTotal||0).toFixed(2)}</span></div>
            <div class="detail-row"><span class="label">Margin VAT</span><span class="value">€${Number(tx.marginVatTotal||0).toFixed(2)}</span></div>`;
        if(tx.paymentMethod==='cash'){
            html+=`<div class="detail-row"><span class="label">实收</span><span class="value">€${Number(tx.cashReceived||0).toFixed(2)}</span></div>`;
            html+=`<div class="detail-row"><span class="label">找零</span><span class="value">€${Number(tx.changeGiven||0).toFixed(2)}</span></div>`;
        }
        if(tx.orderDiscount&&tx.orderDiscount.value){
            html+=`<div class="detail-row"><span class="label">整单折扣</span><span class="value">${tx.orderDiscount.type==='percentage'?tx.orderDiscount.value+'%':'€'+tx.orderDiscount.value}</span></div>`;
        }
        html+=`<div class="detail-items"><h4 style="margin:12px 0 8px;">商品明细</h4><table>
            <thead><tr><th>商品</th><th>数量</th><th>单价</th><th>小计</th></tr></thead>
            <tbody>${(tx.items||[]).map(it=>`<tr>
                <td>${esc(it.name)}${it.isSecondHand?' <span class="badge" style="background:#fff3cd;color:#856404;">二手</span>':''}${it.serialNumber?' <br><small style="color:#0071e3;">SN: '+esc(it.serialNumber)+'</small>':''}</td>
                <td>${it.quantity}</td>
                <td>€${Number(it.unitPrice).toFixed(2)}${it.discount&&it.discount.value?' <small style="color:#ff3b30;">(折扣: '+(it.discount.type==='percentage'?it.discount.value+'%':'€'+it.discount.value)+')</small>':''}</td>
                <td>€${Number(it.subtotal).toFixed(2)}</td>
            </tr>`).join('')}</tbody></table></div>`;
        document.getElementById('detailContent').innerHTML=html;
        document.getElementById('detailModal').classList.add('show');
    }catch(e){showToast('加载详情失败','error');}
}
window.viewDetail=viewDetail;

async function silentDelete(id){
    if(!confirm('⚠️ 无痕删除\n\n此操作将永久删除该交易记录并恢复库存。\n确定要继续吗？'))return;
    if(!confirm('再次确认：此操作不可撤销，确定删除？'))return;
    try{const r=await apiFetch('/transactions/'+id+'/delete',{method:'DELETE'});if(!r)return;if(!r.ok){const e=await r.json();showToast(e.error,'error');return;}showToast('交易已删除');loadTransactions();}catch(e){showToast('删除失败','error');}
}
window.silentDelete=silentDelete;

async function exportTx(format){
    const start=document.getElementById('startDate').value;
    const end=document.getElementById('endDate').value;
    let url='/transactions/export?format='+format;
    if(start)url+='&startDate='+start;
    if(end)url+='&endDate='+end;
    try{
        const r=await apiFetch(url);if(!r)return;
        if(!r.ok){const e=await r.json();showToast(e.error,'error');return;}
        const blob=await r.blob();
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='transactions.'+format;
        a.click();URL.revokeObjectURL(a.href);
        showToast('导出成功');
        loadTransactions();
    }catch(e){showToast('导出失败','error');}
}
window.exportTx=exportTx;

async function batchDelete(){
    if(!confirm('⚠️ 批量删除已导出记录\n\n此操作将删除所有已标记为"已导出"的交易记录。\n确定要继续吗？'))return;
    if(!confirm('再次确认：此操作不可撤销，确定批量删除？'))return;
    try{
        const r=await apiFetch('/transactions/batch-delete',{method:'DELETE',body:JSON.stringify({confirmed:true})});
        if(!r)return;if(!r.ok){const e=await r.json();showToast(e.error,'error');return;}
        const data=await r.json();showToast(`已删除 ${data.deletedCount||0} 条记录`);loadTransactions();
    }catch(e){showToast('批量删除失败','error');}
}
window.batchDelete=batchDelete;

async function reprintReceipt(id){
    try{
        const r=await apiFetch('/transactions/'+id);if(!r)return;
        const tx=await r.json();
        // Try Print Agent first
        try{
            const pr=await fetch('http://localhost:9100/print',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({transaction:tx}),signal:AbortSignal.timeout(5000)});
            if(pr.ok){showToast('Sent to printer');return;}
        }catch(e){}
        // Fallback: browser print with full receipt
        const win=window.open('','_blank','width=320,height=500');
        const pm=tx.paymentMethod==='split'?'Card+Cash':tx.paymentMethod==='card'?'Card':'Cash';
        let itemsHtml='';
        (tx.items||[]).forEach(it=>{
            const price=(it.discountedPrice!=null?it.discountedPrice:it.unitPrice)||0;
            itemsHtml+='<div style="display:flex;justify-content:space-between;"><span>'+(it.quantity>1?it.quantity+'x ':'')+esc(it.name)+'</span><span>€'+(price*(it.quantity||1)).toFixed(2)+'</span></div>';
            if(it.serialNumber)itemsHtml+='<div style="font-size:10px;color:#666;">SN: '+esc(it.serialNumber)+'</div>';
        });
        win.document.write(`<html><head><title>Receipt</title><style>@page{size:68mm auto;margin:0;}body{font-family:"Courier New",monospace;font-size:12px;font-weight:600;padding:6px;max-width:238px;margin:0 auto;color:#000;-webkit-print-color-adjust:exact;}hr{border:none;border-top:1px dashed #000;margin:8px 0;}.center{text-align:center;}.right{text-align:right;}.small{font-size:11px;}</style></head><body>`);
        win.document.write('<div class="center"><strong style="font-size:16px;">Tech Cross Repair Centre</strong></div>');
        win.document.write('<div class="center small">Unit 4, Navan Shopping Centre, Navan, Co. Meath, C15 F658</div>');
        win.document.write('<div class="center small">Tel: 046 905 9854 | Mob: 089 482 5300</div>');
        win.document.write('<div class="center small">navantechcross@gmail.com | techcross.ie</div>');
        win.document.write('<hr>');
        win.document.write('<div>Receipt #: '+esc(tx.receiptNumber)+'</div>');
        win.document.write('<div>Date: '+new Date(tx.createdAt).toLocaleString('en-IE')+'</div>');
        win.document.write('<hr>');
        win.document.write(itemsHtml);
        win.document.write('<hr>');
        win.document.write('<div class="right" style="font-size:16px;font-weight:bold;">TOTAL: €'+Number(tx.totalAmount).toFixed(2)+'</div>');
        win.document.write('<div>Payment: '+pm+'</div>');
        if(tx.cashReceived)win.document.write('<div>Cash: €'+Number(tx.cashReceived).toFixed(2)+'</div>');
        if(tx.cardAmount)win.document.write('<div>Card: €'+Number(tx.cardAmount).toFixed(2)+'</div>');
        if(tx.changeGiven>0)win.document.write('<div><strong>Change: €'+Number(tx.changeGiven).toFixed(2)+'</strong></div>');
        win.document.write('<hr>');
        if(tx.standardVatTotal>0)win.document.write('<div class="small">Standard VAT: €'+Number(tx.standardVatTotal).toFixed(2)+'</div>');
        if(tx.marginVatTotal>0)win.document.write('<div class="small">Margin VAT: €'+Number(tx.marginVatTotal).toFixed(2)+'</div>');
        win.document.write('<hr>');
        win.document.write('<div class="small center">Warranty & Store Policy | Repairs - 3 Months: Covers replaced parts for hardware defects only. Void if physical/liquid damage or third-party repair. | Accessories - 14 Days: Exchange/return only if unopened, sealed, and resalable.</div>');
        if((tx.items||[]).some(i=>i.isSecondHand))win.document.write('<div class="small center" style="margin-top:4px;">Pre-owned Devices - 7 Days: No physical/liquid damage. Must be fully erased (no ID/passcode). Locked devices are non-refundable.</div>');
        win.document.write('<div class="center" style="margin-top:8px;font-size:9px;color:#999;">Sales T&C: techcross.ie/receipt-terms.html</div>');
        win.document.write('<div class="center" style="font-size:9px;color:#999;">Repair T&C: techcross.ie/terms.html</div>');
        win.document.write('<div class="center" style="margin-top:10px;font-weight:bold;">Thank you!</div>');
        win.document.write('</body></html>');
        win.document.close();
        win.focus();
        win.print();
    }catch(e){showToast('Reprint failed','error');}
}
window.reprintReceipt=reprintReceipt;

window.loadTransactions=loadTransactions;

function loadToday(){
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('startDate').value=today;
    document.getElementById('endDate').value=today;
    document.getElementById('searchReceipt').value='';
    loadTransactions();
}
window.loadToday=loadToday;

var _pendingRefundReceipt = null;

async function refundTx(receiptNumber){
    _pendingRefundReceipt = receiptNumber;
    document.getElementById('refundDialogInfo').textContent = 'Receipt #' + receiptNumber;
    document.getElementById('refundDialog').style.display = 'flex';
}
window.refundTx=refundTx;

window.confirmRefund = async function(method) {
    document.getElementById('refundDialog').style.display = 'none';
    if (!_pendingRefundReceipt) return;
    try{
        const r=await apiFetch('/transactions/refund',{method:'POST',body:JSON.stringify({receiptNumber:_pendingRefundReceipt,refundMethod:method})});
        if(!r)return;
        const data=await r.json();
        if(!r.ok){showToast(data.error||'Refund failed','error');return;}
        showToast('Refund processed: #'+data.refund.receiptNumber);
        loadTransactions();
    }catch(e){showToast('Refund error: '+e.message,'error');}
    _pendingRefundReceipt = null;
};

window.cancelRefund = function() {
    document.getElementById('refundDialog').style.display = 'none';
    _pendingRefundReceipt = null;
};

loadTransactions();
})();
</script>
</body>
</html>
